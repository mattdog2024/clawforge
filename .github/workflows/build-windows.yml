name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---------------------------------------------------------------
      # Patch Next.js glob to skip EPERM/EACCES on Windows
      # ---------------------------------------------------------------
      - name: Patch Next.js glob to skip EPERM/EACCES on Windows
        shell: pwsh
        run: |
          $globFile = Get-ChildItem -Path node_modules -Recurse -Filter "glob.js" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*next*compiled*glob*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $globFile) {
            Write-Host "glob.js not found, skipping patch"
            exit 0
          }

          Write-Host "Patching: $globFile"
          $content = Get-Content $globFile -Raw

          $original = 'case"ENOENT":case"ELOOP":case"ENAMETOOLONG":case"UNKNOWN":'
          $patched  = 'case"ENOENT":case"ELOOP":case"ENAMETOOLONG":case"UNKNOWN":case"EPERM":case"EACCES":'

          if ($content -like "*$patched*") {
            Write-Host "Already patched, skipping."
          } elseif ($content -like "*$original*") {
            $content = $content.Replace($original, $patched)
            Set-Content $globFile $content -NoNewline
            Write-Host "Patch applied successfully."
          } else {
            Write-Host "Pattern not found in glob.js - file may have changed."
          }

      # ---------------------------------------------------------------
      # Prepare build resources
      # ---------------------------------------------------------------
      - name: Prepare build resources
        shell: pwsh
        run: |
          if (-not (Test-Path "build")) {
            New-Item -ItemType Directory -Path "build" -Force | Out-Null
          }
          if (-not (Test-Path "scripts/after-sign.js")) {
            New-Item -ItemType Directory -Path "scripts" -Force | Out-Null
            Set-Content -Path "scripts/after-sign.js" -Value "exports.default = async function afterSign(context) { console.log('afterSign: skipping (not darwin)') }" -Encoding utf8
          }

      # ---------------------------------------------------------------
      # Build Next.js standalone output
      # ---------------------------------------------------------------
      - name: Build Next.js
        run: pnpm build:next
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NEXT_PRIVATE_OUTPUT_TRACE_ROOT: ${{ github.workspace }}

      # ---------------------------------------------------------------
      # Build Electron main + preload, bundle Node.js runtime, etc.
      # ---------------------------------------------------------------
      - name: Build Electron
        run: pnpm build:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ---------------------------------------------------------------
      # CRITICAL: Prepare standalone directory for packaging.
      # Copy .next/standalone to packaged-standalone/ and ensure
      # 'next' and all required modules are present.
      # This bypasses electron-builder's extraResources which was
      # causing node_modules to be excluded.
      # ---------------------------------------------------------------
      - name: Prepare packaged standalone
        shell: pwsh
        run: |
          $src = ".next\standalone"
          $dst = "packaged-standalone"

          # Remove old packaged-standalone if exists
          if (Test-Path $dst) {
            Remove-Item -Path $dst -Recurse -Force
          }

          # Copy entire standalone directory
          Write-Host "Copying standalone to packaged-standalone..."
          Copy-Item -Path $src -Destination $dst -Recurse -Force
          Write-Host "Copy complete."

          # Ensure 'next' module is present
          $dstNM = "$dst\node_modules"
          if (Test-Path "$dstNM\next\package.json") {
            Write-Host "next module already present."
          } else {
            Write-Host "next module MISSING - copying from project node_modules..."
            $nextSrc = $null
            if (Test-Path "node_modules\next\package.json") {
              $nextSrc = "node_modules\next"
            }
            if (-not $nextSrc) {
              $pnpmEntry = Get-ChildItem -Path "node_modules\.pnpm" -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -like "next@*" } | Select-Object -First 1
              if ($pnpmEntry) {
                $inner = Join-Path $pnpmEntry.FullName "node_modules\next"
                if (Test-Path $inner) { $nextSrc = $inner }
              }
            }
            if ($nextSrc) {
              New-Item -ItemType Directory -Path "$dstNM\next" -Force | Out-Null
              Copy-Item -Path $nextSrc -Destination "$dstNM\next" -Recurse -Force
              Write-Host "Copied next module."

              # Copy key next runtime deps
              $deps = @("@next", "styled-jsx", "postcss", "nanoid", "critters", "cssnano", "lightningcss")
              foreach ($dep in $deps) {
                $depDest = "$dstNM\$dep"
                if (-not (Test-Path $depDest)) {
                  $found = $null
                  if (Test-Path "node_modules\$dep") {
                    $found = "node_modules\$dep"
                  } else {
                    $candidates = Get-ChildItem -Path "node_modules\.pnpm" -Directory -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -like "*${dep}*" } | Select-Object -First 1
                    if ($candidates) {
                      $inner = Join-Path $candidates.FullName "node_modules\$dep"
                      if (Test-Path $inner) { $found = $inner }
                    }
                  }
                  if ($found) {
                    Copy-Item -Path $found -Destination $depDest -Recurse -Force
                    Write-Host "Copied $dep"
                  }
                }
              }
            } else {
              Write-Error "Cannot find 'next' package!"
              exit 1
            }
          }

          # Verify
          Write-Host ""
          Write-Host "=== packaged-standalone/node_modules contents ==="
          $nmCount = (Get-ChildItem -Path $dstNM -Directory -ErrorAction SilentlyContinue).Count
          Write-Host "Total packages: $nmCount"
          if (Test-Path "$dstNM\next\package.json") {
            Write-Host "next: OK"
          } else {
            Write-Error "next: STILL MISSING!"
            exit 1
          }

          # Also verify server.js exists
          if (Test-Path "$dst\server.js") {
            Write-Host "server.js: OK"
          } else {
            Write-Error "server.js: MISSING!"
            exit 1
          }

      # ---------------------------------------------------------------
      # Verify build artifacts
      # ---------------------------------------------------------------
      - name: Verify build artifacts
        shell: pwsh
        run: |
          Write-Host "=== dist-electron/ ==="
          Get-ChildItem -Path dist-electron -File -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name)"
          }
          Write-Host "=== packaged-standalone/ ==="
          Write-Host "  server.js: $(Test-Path 'packaged-standalone\server.js')"
          Write-Host "  next module: $(Test-Path 'packaged-standalone\node_modules\next\package.json')"
          Write-Host "  node-runtime: $(Test-Path 'node-runtime\node.exe')"
          Write-Host "=== All checks passed ==="

      # ---------------------------------------------------------------
      # Package Windows installer
      # ---------------------------------------------------------------
      - name: Package Windows installer
        run: pnpm exec electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # List and upload artifacts
      # ---------------------------------------------------------------
      - name: List release artifacts
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem -Path release -Recurse -File | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} | Format-Table
          } else {
            Write-Host "release/ directory not found"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Windows-Installer
          path: |
            release/*.exe
            release/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Forge ${{ github.ref_name }} (Windows)"
          body: |
            ## Windows 安装包

            下载 `.exe` 文件，双击安装即可。

            **使用前请确保已安装 Claude Code CLI：**
            ```bash
            npm install -g @anthropic-ai/claude-code
            claude login
            ```
          files: |
            release/*.exe
            release/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
