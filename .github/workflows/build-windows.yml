name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch Next.js glob to skip EPERM/EACCES on Windows
        shell: pwsh
        run: |
          $globFile = Get-ChildItem -Path node_modules -Recurse -Filter "glob.js" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*next*compiled*glob*" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $globFile) {
            Write-Host "glob.js not found, skipping patch"
            exit 0
          }
          Write-Host "Patching: $globFile"
          $content = Get-Content $globFile -Raw
          $original = 'case"ENOENT":case"ELOOP":case"ENAMETOOLONG":case"UNKNOWN":'
          $patched  = 'case"ENOENT":case"ELOOP":case"ENAMETOOLONG":case"UNKNOWN":case"EPERM":case"EACCES":'
          if ($content -like "*$patched*") {
            Write-Host "Already patched, skipping."
          } elseif ($content -like "*$original*") {
            $content = $content.Replace($original, $patched)
            Set-Content $globFile $content -NoNewline
            Write-Host "Patch applied successfully."
          } else {
            Write-Host "Pattern not found in glob.js - file may have changed."
          }

      - name: Prepare build resources
        shell: pwsh
        run: |
          if (-not (Test-Path "build")) {
            New-Item -ItemType Directory -Path "build" -Force | Out-Null
          }
          if (-not (Test-Path "scripts/after-sign.js")) {
            New-Item -ItemType Directory -Path "scripts" -Force | Out-Null
            Set-Content -Path "scripts/after-sign.js" -Value "exports.default = async function afterSign(context) { console.log('afterSign: skipping (not darwin)') }" -Encoding utf8
          }

      - name: Build Next.js
        run: pnpm build:next
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NEXT_PRIVATE_OUTPUT_TRACE_ROOT: ${{ github.workspace }}

      - name: Build Electron
        run: pnpm build:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare standalone for afterPack injection
        shell: pwsh
        run: |
          if (Test-Path "standalone-stage") {
            Remove-Item -Path "standalone-stage" -Recurse -Force
          }
          Copy-Item -Path ".next\standalone" -Destination "standalone-stage" -Recurse -Force
          Write-Host "Copied standalone to standalone-stage"
          if (Test-Path "standalone-stage\node_modules\next\package.json") {
            Write-Host "next module already present"
          } else {
            Write-Host "Copying next module into standalone-stage..."
            $nextSrc = "node_modules\next"
            if (-not (Test-Path "$nextSrc\package.json")) {
              $pnpmEntry = Get-ChildItem -Path "node_modules\.pnpm" -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -like "next@*" } | Select-Object -First 1
              if ($pnpmEntry) {
                $candidate = Join-Path $pnpmEntry.FullName "node_modules\next"
                if (Test-Path "$candidate\package.json") { $nextSrc = $candidate }
              }
            }
            if (Test-Path "$nextSrc\package.json") {
              New-Item -ItemType Directory -Path "standalone-stage\node_modules\next" -Force | Out-Null
              Copy-Item -Path "$nextSrc\*" -Destination "standalone-stage\node_modules\next" -Recurse -Force
              Write-Host "Copied next module"
              $deps = @("@next", "styled-jsx", "postcss", "nanoid")
              foreach ($dep in $deps) {
                $depDest = "standalone-stage\node_modules\$dep"
                if (-not (Test-Path "$depDest\package.json")) {
                  $depSrc = "node_modules\$dep"
                  if (-not (Test-Path "$depSrc\package.json")) {
                    $c = Get-ChildItem -Path "node_modules\.pnpm" -Directory -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -like "*${dep}*" } | Select-Object -First 1
                    if ($c) {
                      $inner = Join-Path $c.FullName "node_modules\$dep"
                      if (Test-Path "$inner\package.json") { $depSrc = $inner }
                    }
                  }
                  if (Test-Path "$depSrc\package.json") {
                    New-Item -ItemType Directory -Path $depDest -Force | Out-Null
                    Copy-Item -Path "$depSrc\*" -Destination $depDest -Recurse -Force
                    Write-Host "Copied dependency: $dep"
                  }
                }
              }
            } else {
              Write-Error "Cannot find next package!"
              exit 1
            }
          }
          if (-not (Test-Path "standalone-stage\node_modules\next\package.json")) {
            Write-Error "VERIFICATION FAILED: next module not found!"
            exit 1
          }
          if (-not (Test-Path "standalone-stage\server.js")) {
            Write-Error "VERIFICATION FAILED: server.js not found!"
            exit 1
          }
          $pkgCount = (Get-ChildItem -Path "standalone-stage\node_modules" -Directory).Count
          Write-Host "Verification passed: $pkgCount packages, next OK, server.js OK"

      - name: Package Windows installer
        run: pnpm exec electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify installer contents
        shell: pwsh
        run: |
          $unpackedDir = "release\win-unpacked"
          if (Test-Path $unpackedDir) {
            Write-Host "=== win-unpacked top-level ==="
            Get-ChildItem -Path $unpackedDir | Select-Object Name | Format-Table
            $saDir = "$unpackedDir\resources\standalone"
            if (Test-Path $saDir) {
              Write-Host "standalone directory: EXISTS"
              if (Test-Path "$saDir\server.js") { Write-Host "server.js: PRESENT" } else { Write-Host "server.js: MISSING" }
              if (Test-Path "$saDir\node_modules\next\package.json") { Write-Host "next module: PRESENT" } else { Write-Host "next module: MISSING" }
              if (Test-Path "$saDir\node_modules") {
                $n = (Get-ChildItem -Path "$saDir\node_modules" -Directory).Count
                Write-Host "node_modules packages: $n"
              }
            } else {
              Write-Host "standalone directory: MISSING"
            }
          } else {
            Write-Host "win-unpacked directory not found"
          }

      - name: List release artifacts
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem -Path release -Recurse -File | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} | Format-Table
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Windows-Installer
          path: |
            release/*.exe
            release/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Forge ${{ github.ref_name }} (Windows)"
          body: |
            ## Windows 安装包
            下载 `.exe` 文件，双击安装即可。
            **使用前请确保已安装 Claude Code CLI：**
            ```bash
            npm install -g @anthropic-ai/claude-code
            claude login
            ```
          files: |
            release/*.exe
            release/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
