name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---------------------------------------------------------------
      # Patch Next.js's compiled glob module to silently skip
      # EPERM/EACCES errors on Windows (protected NTFS junction points).
      # ---------------------------------------------------------------
      - name: Patch Next.js glob to skip EPERM/EACCES on Windows
        shell: pwsh
        run: |
          $globFile = Get-ChildItem -Path node_modules -Recurse -Filter "glob.js" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*next*compiled*glob*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $globFile) {
            Write-Host "glob.js not found, skipping patch"
            exit 0
          }

          Write-Host "Patching: $globFile"
          $content = Get-Content $globFile -Raw

          $original = 'case"ENOENT":case"ELOOP":case"ENAMETOOLONG":case"UNKNOWN":'
          $patched  = 'case"ENOENT":case"ELOOP":case"ENAMETOOLONG":case"UNKNOWN":case"EPERM":case"EACCES":'

          if ($content -like "*$patched*") {
            Write-Host "Already patched, skipping."
          } elseif ($content -like "*$original*") {
            $content = $content.Replace($original, $patched)
            Set-Content $globFile $content -NoNewline
            Write-Host "Patch applied successfully."
          } else {
            Write-Host "Pattern not found in glob.js - file may have changed."
          }

      # ---------------------------------------------------------------
      # Prepare build resources directory.
      # electron-builder.json references build/ for buildResources.
      # ---------------------------------------------------------------
      - name: Prepare build resources
        shell: pwsh
        run: |
          if (-not (Test-Path "build")) {
            New-Item -ItemType Directory -Path "build" -Force | Out-Null
          }

          # Create stub after-sign.js if missing (script already in repo, just in case)
          if (-not (Test-Path "scripts/after-sign.js")) {
            New-Item -ItemType Directory -Path "scripts" -Force | Out-Null
            Set-Content -Path "scripts/after-sign.js" -Value "exports.default = async function afterSign(context) { console.log('afterSign: skipping (not darwin)') }" -Encoding utf8
            Write-Host "Created stub after-sign.js"
          }

      # ---------------------------------------------------------------
      # Build Next.js standalone output
      # ---------------------------------------------------------------
      - name: Build Next.js
        run: pnpm build:next
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NEXT_PRIVATE_OUTPUT_TRACE_ROOT: ${{ github.workspace }}

      # ---------------------------------------------------------------
      # Build Electron main + preload, bundle Node.js runtime, etc.
      # ---------------------------------------------------------------
      - name: Build Electron
        run: pnpm build:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ---------------------------------------------------------------
      # Debug: verify the build artifacts exist before packaging
      # ---------------------------------------------------------------
      - name: Verify build artifacts
        shell: pwsh
        run: |
          Write-Host "=== Checking dist-electron/ ==="
          if (Test-Path "dist-electron") {
            Get-ChildItem -Path dist-electron -File | ForEach-Object {
              Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB, 1)) KB)"
            }
          } else {
            Write-Error "dist-electron/ directory is missing!"
            exit 1
          }

          Write-Host "=== Checking .next/standalone/ ==="
          if (Test-Path ".next/standalone") {
            $items = (Get-ChildItem -Path .next/standalone -Recurse -File).Count
            Write-Host "  $items files found"
          } else {
            Write-Error ".next/standalone/ directory is missing!"
            exit 1
          }

          Write-Host "=== Checking node-runtime/ ==="
          if (Test-Path "node-runtime") {
            Get-ChildItem -Path node-runtime -File | Select-Object -First 5 | ForEach-Object {
              Write-Host "  $($_.Name)"
            }
          } else {
            Write-Warning "node-runtime/ directory is missing (server will use system Node.js)"
          }

          Write-Host "=== Checking templates/ ==="
          if (Test-Path "templates") {
            Get-ChildItem -Path templates -Directory | ForEach-Object {
              Write-Host "  $($_.Name)/"
            }
          } else {
            Write-Warning "templates/ directory is missing"
          }

          Write-Host "=== All checks passed ==="

      # ---------------------------------------------------------------
      # Package Windows installer with NSIS
      # ---------------------------------------------------------------
      - name: Package Windows installer
        run: pnpm exec electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # List and upload artifacts
      # ---------------------------------------------------------------
      - name: List release artifacts
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem -Path release -Recurse -File | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} | Format-Table
          } else {
            Write-Host "release/ directory not found"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Windows-Installer
          path: |
            release/*.exe
            release/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Forge ${{ github.ref_name }} (Windows)"
          body: |
            ## Windows 安装包

            下载 `.exe` 文件，双击安装即可。

            **使用前请确保已安装 Claude Code CLI：**
            ```bash
            npm install -g @anthropic-ai/claude-code
            claude login
            ```
          files: |
            release/*.exe
            release/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
